<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1b1240">
  <title>Math Game</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css?v=58">
</head>
<body>
  <header class="topbar">
    <div class="brand">Math Game</div>
    <nav class="tabs" aria-label="Main navigation">
      <button class="tab active" data-tab="home">Home</button>
      <button class="tab" data-tab="vocab">Vocab</button>
      <button class="tab" data-tab="sentences">Sentences</button>
      <button class="tab" data-tab="practice">Practice</button>
      <button class="tab" data-tab="countdown">Countdown</button>
      <button class="tab" data-tab="snakes">S&amp;L</button>
      <button class="tab" data-tab="quiz">Quiz</button>
    </nav>
  </header>

  <main id="app" class="stage"></main>

  <section id="scoreboard" class="scoreboard hidden" aria-label="Team scores"></section>

  <div id="popup" class="popup hidden" role="dialog" aria-modal="true">
    <div class="popup-card">
      <button id="popupClose" class="popup-close" aria-label="Close popup">×</button>
      <div id="popupContent"></div>
    </div>
  </div>

  <script src="script.js?v=58"></script>
</body>
</html>
